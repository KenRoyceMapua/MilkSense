<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - MilkSense</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-bg-blur"></div>
    <div class="login-card">
      <div class="login-logo" style="width: 140px; height: 140px; background: transparent; overflow: hidden; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; box-shadow: none;">
        <img src="milk.jpg" alt="Makati Milk Bank Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 50%;">
      </div>

      <!-- Title -->
      <h1 class="login-title">MilkSense</h1>
      <p class="login-subtitle">Inventory System</p>

      <!-- Form -->
      <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
        <!-- Email Field -->
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="admin@makatimilkbank.org"
            required
            autocomplete="email"
          />
          <span class="form-error" id="emailError"></span>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              class="form-input password-input"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
            <button
              type="button"
              id="togglePassword"
              class="password-toggle"
              title="Toggle password visibility"
              aria-label="Toggle password visibility"
            >
              <span class="toggle-icon">👁️</span>
            </button>
          </div>
          <span class="form-error" id="passwordError"></span>
        </div>

        <div class="form-row">
          <label class="checkbox-label">
            <input
              type="checkbox"
              id="rememberMe"
              name="rememberMe"
              class="checkbox-input"
            />
            <span>Remember me</span>
          </label>
          <a href="forgot-password.html" class="forgot-password-link">Forgot password?</a>
        </div>

        <div class="error-message" id="loginError"></div>

        <button type="submit" class="btn-login" id="submitBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader"></span>
        </button>
      </form>

      <!-- DEMO ONLY
      <div class="demo-credentials">
        <p class="demo-title">Demo Credentials</p>
        <div class="demo-item">
          <span class="demo-label">Email:</span>
          <code class="demo-value">admin@makatimilkbank.org</code>
        </div>
        <div class="demo-item">
          <span class="demo-label">Password:</span>
          <code class="demo-value">admin123</code>
        </div>
      </div>
      -->

      <p class="login-footer">
        ©2026 Makati Milk Bank. All rights reserved.
      </p>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
