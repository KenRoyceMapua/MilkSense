<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Makati Milk Bank</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-bg-blur"></div>

    <div class="login-card">
      <div class="login-logo" style="width: 140px; height: 140px; background: transparent; overflow: hidden; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; box-shadow: none;">
        <img src="milk.jpg" alt="Makati Milk Bank Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 50%;">
      </div>

      <h1 class="login-title">Reset Password</h1>
      <p class="login-subtitle">Enter your email to receive reset instructions</p>

      <form id="forgotPasswordForm" class="login-form">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="admin@makatimilkbank.org"
            required
            autocomplete="email"
          />
        </div>

        <div class="error-message" id="resetMessage"></div>

        <button type="submit" class="btn-login" id="resetBtn">
          <span class="btn-text">Send Reset Link</span>
          <span class="btn-loader"></span>
        </button>

        <div style="text-align: center; margin-top: 1rem;">
          <a href="signin.html" class="forgot-password-link" style="font-weight: 500; text-decoration: none;">← Back to Sign In</a>
        </div>
      </form>

      <p class="login-footer">
        ©2026 Makati Milk Bank. All rights reserved.
      </p>
    </div>
  </div>

  <script type="module">
    import { supabase } from './src/supabase.js';

    async function handleReset(event) {
      event.preventDefault();
      
      const btn = document.getElementById('resetBtn');
      const msg = document.getElementById('resetMessage');
      const email = document.getElementById('email').value.trim();
      
      btn.classList.add('loading');
      btn.disabled = true;
      msg.classList.remove('show');

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-password.html'
      });

      btn.classList.remove('loading');
      btn.disabled = false;

      if (error) {
        msg.className = 'error-message show';
        msg.innerHTML = error.message;
      } else {
        msg.className = 'error-message success-message show';
        msg.innerHTML = '✓ Reset instructions sent! Please check your email.';
        document.getElementById('email').value = '';
      }
    }

    document.getElementById('forgotPasswordForm').addEventListener('submit', handleReset);
  </script>
</body>
</html>
