<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Makati Milk Bank</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-bg-blur"></div>

    <div class="login-card">
      <div class="login-logo" style="width: 140px; height: 140px; background: transparent; overflow: hidden; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; box-shadow: none;">
        <img src="milk.jpg" alt="Makati Milk Bank Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 50%;">
      </div>

      <h1 class="login-title">New Password</h1>
      <p class="login-subtitle">Enter your new password below</p>

      <form id="resetPasswordForm" class="login-form">
        <div class="form-group">
          <label for="password" class="form-label">New Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              class="form-input password-input"
              placeholder="••••••••"
              required
            />
            <button type="button" id="togglePassword" class="password-toggle" title="Toggle password visibility">
              <span class="toggle-icon">👁️</span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              class="form-input password-input"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        <div class="error-message" id="resetMessage"></div>

        <button type="submit" class="btn-login" id="resetBtn">
          <span class="btn-text">Update Password</span>
          <span class="btn-loader"></span>
        </button>
      </form>

      <p class="login-footer">
        ©2026 Makati Milk Bank. All rights reserved.
      </p>
    </div>
  </div>

  <script type="module">
    import { supabase } from './src/supabase.js';

    // Password toggle
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    toggleBtn?.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      toggleBtn.querySelector('.toggle-icon').textContent = isPassword ? '🙈' : '👁️';
    });

    // Handle form submit
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const msg = document.getElementById('resetMessage');
      const btn = document.getElementById('resetBtn');

      // Check passwords match
      if (password !== confirmPassword) {
        msg.className = 'error-message show';
        msg.textContent = 'Passwords do not match!';
        return;
      }

      // Check minimum length
      if (password.length < 6) {
        msg.className = 'error-message show';
        msg.textContent = 'Password must be at least 6 characters.';
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      const { error } = await supabase.auth.updateUser({ password });

      btn.classList.remove('loading');
      btn.disabled = false;

      if (error) {
        msg.className = 'error-message show';
        msg.textContent = error.message;
      } else {
        msg.className = 'error-message success-message show';
        msg.textContent = '✓ Password updated! Redirecting to login...';
        setTimeout(() => {
          window.location.href = 'signin.html';
        }, 2000);
      }
    });
  </script>
</body>
</html>
